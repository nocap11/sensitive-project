<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROM TEXT TO FEELING | AI 감성 분석</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">F.T.F</div>
            <div class="status-indicator" id="apiStatus">AI Analysis Ready</div>
        </div>
    </header>

    <main class="main">
        <section class="hero">
            <div class="container">
                <h1 class="hero-title">FROM TEXT TO FEELING</h1>
                <p class="hero-subtitle">문장을 입력하면 AI가 감성을 분석합니다.</p>
            </div>
        </section>

        <section class="analysis-section">
            <div class="container">
                <div class="input-panel">
                    <textarea id="inputText" placeholder="분석할 문장을 입력해 주세요... (최대 1000자)" maxlength="1000"></textarea>
                    <div class="button-wrapper">
                        <button id="analyzeBtn" class="btn btn-primary">분석하기</button>
                    </div>
                </div>

                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>AI가 문장을 분석 중입니다...</p>
                </div>

                <div id="errorBox" class="error-box hidden"></div>

                <div id="resultCard" class="result-card hidden">
                    <div class="result-header">
                        <span class="result-label">분석 결과</span>
                        <span id="sentimentBadge" class="badge">긍정</span>
                    </div>
                    <div class="result-body">
                        <div class="result-info">
                            <div class="confidence-section">
                                <span class="label">신뢰도</span>
                                <div class="progress-bar">
                                    <div id="confidenceBar" class="progress" style="width: 0%"></div>
                                </div>
                                <span id="confidenceText" class="value">0%</span>
                            </div>
                            <div class="reason-section">
                                <span class="label">분석 이유</span>
                                <p id="reasonText" class="reason-content"></p>
                            </div>
                        </div>
                        <div class="sentiment-visual">
                            <img id="sentimentImg" src="" alt="Sentiment Visual" class="sentiment-img">
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="game-section">
            <div class="container">
                <div class="game-card">
                    <div class="game-header">
                        <h2>EMOJI CATCH</h2>
                        <div class="game-stats">
                            <span>Score: <b id="gameScore">0</b></span>
                            <span>Time: <b id="gameTimer">30</b>s</span>
                        </div>
                    </div>
                    <div class="game-container">
                        <canvas id="gameCanvas"></canvas>
                        <div class="game-overlay">
                            <button id="startGameBtn" class="btn btn-primary">게임 시작</button>
                        </div>
                    </div>
                    <p class="game-desc">긍정 이모지를 받으세요! (+10점) 부정 이모지는 피하세요! (-5점)</p>
                </div>
            </div>
        </section>
    </main>

    <script src="game.js"></script>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 FROM TEXT TO FEELING. Powered by OpenAI.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
